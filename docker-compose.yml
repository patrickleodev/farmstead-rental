services:
  server:
    build:
      context: ./server
    environment:
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: http://localhost:4200,http://localhost:8080,capacitor://localhost,http://localhost,https://localhost
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  client:
    build:
      context: ./client
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "4200:80"
