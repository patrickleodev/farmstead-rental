services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: farmstead_rental
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d farmstead_rental"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    env_file:
      - ./server/.env
    environment:
      DB_HOST: database
      DB_SSL: "false"
      TYPEORM_MIGRATIONS_RUN: "true"
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  client:
    build:
      context: ./client
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "4200:80"

volumes:
  postgres-data:
